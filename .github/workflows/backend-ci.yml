name: Backend CI

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'feat/*'
      - 'fix/*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build project
        run: npm run build

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          JWT_SECRET: ci-test-secret
